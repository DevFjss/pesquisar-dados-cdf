<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filtro CDF</title>

<style>
body { font-family: Arial; padding:20px; background:#f4f7fc; }
input { padding:10px; width:300px; margin-bottom:10px; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th,td { padding:8px; border-bottom:1px solid #ddd; }
th { background:#eee; }
mark { background:yellow; }
</style>
</head>

<body>

<h2>🔍 Pesquisa CDF</h2>

<input type="text" id="searchInput" placeholder="Digite NTE, município ou escola">

<p>📋 <span id="count">0</span> registros | 💰 <span id="total">R$ 0</span></p>

<table>
<thead>
<tr>
<th>NTE</th>
<th>Município</th>
<th>Escola</th>
<th>Custeio</th>
<th>Capital</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
const SPREADSHEET_ID = '17hskWwX1cJP6NDuctKgTP3O8ct4WM-xcFnxKYRrHMCY';

let dadosCompletos = [];
let dadosFiltrados = [];
let timeoutFiltro = null;

function extrairNumero(v){
 if(!v) return 0;
 return parseFloat(v.replace(/\./g,'').replace(',','.').replace(/[^\d.-]/g,'')) || 0;
}

function formatarMoeda(v){
 return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);
}

function prepararDados(dados){
 for(let i=0;i<dados.length;i++){
   let nte = dados[i].NTE ? dados[i].NTE.toString().trim() : '';
   let num = parseInt(nte,10);

   dados[i]._nteNumero = isNaN(num)?null:num;
   dados[i]._nteString = !isNaN(num) ? (num<10?'0'+num:num.toString()) : nte;

   dados[i]._custeio = extrairNumero(dados[i.custeio]);
   dados[i]._capital = extrairNumero(dados[i.capital]);
 }
 return dados;
}

function calcular(dados){
 let soma=0;
 for(let d of dados){
   soma += d._custeio + d._capital;
 }
 return soma;
}

function filtrar(termo){
 if(timeoutFiltro) clearTimeout(timeoutFiltro);

 timeoutFiltro = setTimeout(()=>{
   let t = termo.trim();

   if(!t){
     dadosFiltrados = dadosCompletos;
   }else{
     let lower = t.toLowerCase();
     let num = parseInt(t,10);

     let res=[];

     for(let d of dadosCompletos){

       if(!isNaN(num)){
         if(d._nteNumero === num){
           res.push(d);
           continue;
         }
       }

       if(
         (d.Municipio && d.Municipio.toLowerCase().includes(lower)) ||
         (d.Escola && d.Escola.toLowerCase().includes(lower))
       ){
         res.push(d);
       }
     }

     dadosFiltrados = res;
   }

   render();
 },200);
}

function render(){
 let tbody = document.getElementById('tbody');
 tbody.innerHTML='';

 for(let d of dadosFiltrados){
   let tr=document.createElement('tr');

   let td1=document.createElement('td');
   td1.innerText=d._nteString;

   let td2=document.createElement('td');
   td2.innerText=d.Municipio;

   let td3=document.createElement('td');
   td3.innerText=d.Escola;

   let td4=document.createElement('td');
   td4.innerText=formatarMoeda(d._custeio);

   let td5=document.createElement('td');
   td5.innerText=formatarMoeda(d._capital);

   tr.append(td1,td2,td3,td4,td5);
   tbody.appendChild(tr);
 }

 document.getElementById('count').innerText=dadosFiltrados.length;
 document.getElementById('total').innerText=formatarMoeda(calcular(dadosFiltrados));
}

async function carregar(){
 let url=`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv`;

 let r=await fetch(url);
 let txt=await r.text();

 let linhas=txt.split('\n');
 let dados=[];

 for(let i=1;i<linhas.length;i++){
   let col=linhas[i].split(',');
   if(col.length<5) continue;

   dados.push({
     NTE:col[0],
     Municipio:col[1],
     Escola:col[2],
     custeio:col[3],
     capital:col[4]
   });
 }

 dadosCompletos=prepararDados(dados);
 dadosFiltrados=dadosCompletos;

 render();
}

document.getElementById('searchInput')
.addEventListener('input',e=>filtrar(e.target.value));

carregar();
</script>

</body>
</html>
