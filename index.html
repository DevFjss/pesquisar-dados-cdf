<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDF Filtro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter;background:#f4f7fc;padding:20px}

.main-header{display:flex;justify-content:space-between;background:#fff;padding:15px;border-radius:15px;margin-bottom:15px}
.stat-number{font-weight:800;font-size:20px}

.search-box{background:#fff;padding:10px;border-radius:20px;margin-bottom:10px}
.search-box input{border:none;width:100%;outline:none}

.table-wrapper{background:#fff;border-radius:15px;overflow:auto;max-height:60vh}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px;border-bottom:1px solid #eee}
th{position:sticky;top:0;background:#fff}

mark{background:yellow}
</style>
</head>

<body>

<div class="main-header">
<div>
<h2>🔍 Pesquisar CDF</h2>
<p>Filtro NTE rápido</p>
</div>

<div>
<div>Total: <span id="totalRecords">0</span></div>
<div>Valor: <span id="totalValue">R$0</span></div>
</div>
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Digite NTE, município ou escola">
</div>

<p>Filtrados: <span id="filteredCount">0</span> | Valor: <span id="filteredSum">R$0</span></p>

<div class="table-wrapper">
<table>
<thead id="tableHead"></thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>
const SPREADSHEET_ID = '17hskWwX1cJP6NDuctKgTP3O8ct4WM-xcFnxKYRrHMCY';

const COLUNAS = [
'NTE','Municipio','Cod. SEC','Cod. INEP','Unidade Escolar',
'Valor custeio','Valor capital','Remessa','Data da remessa','Finalidade'
];

let dadosCompletos=[];
let dadosFiltrados=[];
let timeoutFiltro=null;

const searchInput=document.getElementById('searchInput');
const filteredCountSpan=document.getElementById('filteredCount');
const filteredSumSpan=document.getElementById('filteredSum');
const totalRecordsSpan=document.getElementById('totalRecords');
const totalValueSpan=document.getElementById('totalValue');
const tableHead=document.getElementById('tableHead');
const tableBody=document.getElementById('tableBody');

function extrairNumero(v){
 if(!v) return 0;
 let s=v.toString().replace(/R\$/,'').replace(/\./g,'').replace(',','.');
 return parseFloat(s.replace(/[^\d.-]/g,''))||0;
}

function formatarMoeda(v){
 return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);
}

function prepararDados(dados){
 for(let i=0;i<dados.length;i++){
  let nte=dados[i].NTE?dados[i].NTE.toString().trim():'';
  let num=parseInt(nte,10);

  dados[i]._nteNumero=isNaN(num)?null:num;
  dados[i]._nteString=!isNaN(num)?(num<10?'0'+num:num.toString()):nte;

  dados[i]._custeio=extrairNumero(dados[i]['Valor custeio']);
  dados[i]._capital=extrairNumero(dados[i]['Valor capital']);
 }
 return dados;
}

function calcularSoma(dados){
 let soma=0;
 for(let d of dados){
  soma+=d._custeio+d._capital;
 }
 return soma;
}

function filtrarDados(termo){
 if(timeoutFiltro) clearTimeout(timeoutFiltro);

 timeoutFiltro=setTimeout(()=>{
  let t=termo.trim();

  if(!t){
   dadosFiltrados=dadosCompletos;
  }else{
   let lower=t.toLowerCase();
   let num=parseInt(t,10);
   let res=[];

   for(let item of dadosCompletos){

    if(!isNaN(num)){
     if(item._nteNumero===num){
      res.push(item);
      continue;
     }
    }

    if(
     (item.Municipio && item.Municipio.toLowerCase().includes(lower)) ||
     (item['Unidade Escolar'] && item['Unidade Escolar'].toLowerCase().includes(lower)) ||
     (item['Cod. SEC'] && item['Cod. SEC'].toLowerCase().includes(lower))
    ){
     res.push(item);
    }
   }

   dadosFiltrados=res;
  }

  filteredCountSpan.innerText=dadosFiltrados.length;
  filteredSumSpan.innerText=formatarMoeda(calcularSoma(dadosFiltrados));

  renderizarTabela(dadosFiltrados,termo);
 },200);
}

function renderizarTabela(dados,termo=''){
 if(tableHead.children.length===0){
  let tr=document.createElement('tr');
  for(let c of COLUNAS){
   let th=document.createElement('th');
   th.innerText=c;
   tr.appendChild(th);
  }
  tableHead.appendChild(tr);
 }

 tableBody.innerHTML='';

 for(let linha of dados){
  let tr=document.createElement('tr');

  let tdNTE=document.createElement('td');
  let nte=linha._nteString;

  let num=parseInt(termo);
  if(!isNaN(num)&&linha._nteNumero===num){
   tdNTE.innerHTML='<mark>'+nte+'</mark>';
  }else{
   tdNTE.innerText=nte;
  }
  tr.appendChild(tdNTE);

  for(let i=1;i<COLUNAS.length;i++){
   let td=document.createElement('td');

   if(i===5) td.innerText=formatarMoeda(linha._custeio);
   else if(i===6) td.innerText=formatarMoeda(linha._capital);
   else td.innerText=linha[COLUNAS[i]]||'';

   tr.appendChild(td);
  }

  tableBody.appendChild(tr);
 }

 totalRecordsSpan.innerText=dadosCompletos.length;
 totalValueSpan.innerText=formatarMoeda(calcularSoma(dadosCompletos));
}

async function carregar(){
 let url=`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv`;

 let r=await fetch(url);
 let txt=await r.text();

 let linhas=txt.split('\n');
 let dados=[];

 for(let i=2;i<linhas.length;i++){
  let col=linhas[i].split(',');
  if(col.length<5) continue;

  let obj={};
  for(let j=0;j<COLUNAS.length;j++){
   obj[COLUNAS[j]]=col[j]||'';
  }

  dados.push(obj);
 }

 dadosCompletos=prepararDados(dados);
 dadosFiltrados=dadosCompletos;

 renderizarTabela(dadosCompletos);
}

searchInput.addEventListener('input',e=>filtrarDados(e.target.value));

carregar();
</script>

</body>
</html>
